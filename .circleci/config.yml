version: 2.1

executors:
  base:
    docker:
      - image: cimg/node:24.15.0-browsers

orbs:
  codecov: codecov/codecov@6.0.0

commands:
  prepare-dependencies:
    steps:
      - checkout

      - restore_cache:
          name: Restore pnpm Package Cache
          keys:
            - pnpm-packages-{{ checksum "pnpm-lock.yaml" }}

      - run:
          name: Enable corepack
          command: |
            corepack prepare pnpm@10.33.0 --activate
            pnpm config set store-dir .pnpm-store

      - run:
          name: Install Dependencies
          command: |
            pnpm install

      - run:
          name: Install Playwright Browsers
          command: |
            pnpm --filter @mahjong/standalone exec playwright install chromium

      - save_cache:
          name: Save pnpm Package Cache
          key: pnpm-packages-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - .pnpm-store

jobs:
  lint-and-test:
    executor: base

    steps:
      - checkout

      - prepare-dependencies

      - run:
          name: Format Check
          command: |
            pnpm run format:check

      - run:
          name: Run Lint
          command: |
            pnpm run lint --continue

      - run:
          name: Run Check Types
          command: |
            pnpm run check-types --continue

      - run:
          name: Run Unit Test
          command: |
            pnpm run test --continue -- --passWithNoTests --coverage

      - codecov/upload

workflows:
  main:
    jobs:
      - lint-and-test
